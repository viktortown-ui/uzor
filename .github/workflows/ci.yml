name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: lts/*, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - name: Build PWA at root base
        run: npm run build
        env:
          VITE_BASE_PATH: /

      - name: Build PWA at GitHub Pages base
        run: npm run build
        env:
          VITE_BASE_PATH: /uzor/

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify Chromium PWA installability
        run: npm run test:pwa-installability
